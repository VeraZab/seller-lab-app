<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Colors — Parchment & Ink</title>
<link rel="stylesheet" href="card.css">
<style>
  .card { gap: 14px; }
  .group { display: flex; flex-direction: column; gap: 8px; }
  .group-title { display: flex; justify-content: space-between; align-items: baseline; font-size: 12px; color: var(--ink-500); }
  .group-title strong { font-family: var(--font-body); font-weight: 600; font-size: 14px; color: var(--ink-900); }
  .row { display: flex; gap: 6px; }
  .sw { flex: 1; height: 60px; border-radius: 8px; padding: 6px 8px; display: flex; flex-direction: column; justify-content: flex-end; border: 1px solid rgba(20,24,42,0.06); }
  .sw .step { font-family: var(--font-mono); font-size: 10.5px; font-weight: 500; }
  .sw .hex { font-family: var(--font-mono); font-size: 9.5px; opacity: 0.7; text-transform: uppercase; }
  .light { color: rgba(20,24,42,0.85); }
  .dark { color: rgba(255,255,255,0.9); }
</style>
</head>
<body>
  <div class="card">
    <div class="group">
      <div class="group-title"><strong>Parchment</strong><span>page background & warm tints · the most identity-defining surface</span></div>
      <div class="row">
        <div class="sw light" style="background:#FBF8F2; box-shadow: 0 0 0 2px var(--ink-900) inset, 0 0 0 4px #fff inset;"><span class="step">50★</span><span class="hex">#FBF8F2</span></div>
        <div class="sw light" style="background:#F4EEE2"><span class="step">100</span><span class="hex">#F4EEE2</span></div>
        <div class="sw light" style="background:#EBE2D0"><span class="step">200</span><span class="hex">#EBE2D0</span></div>
        <div class="sw light" style="background:#D9CBB0"><span class="step">300</span><span class="hex">#D9CBB0</span></div>
        <div class="sw light" style="background:#B8A685"><span class="step">400</span><span class="hex">#B8A685</span></div>
        <div class="sw dark" style="background:#9A8765"><span class="step">500</span><span class="hex">#9A8765</span></div>
      </div>
    </div>
    <div class="group">
      <div class="group-title"><strong>Ink</strong><span>text · never pure black</span></div>
      <div class="row">
        <div class="sw dark" style="background:#14182A"><span class="step">900</span><span class="hex">#14182A</span></div>
        <div class="sw dark" style="background:#2E3550"><span class="step">700</span><span class="hex">#2E3550</span></div>
        <div class="sw dark" style="background:#5A627C"><span class="step">500</span><span class="hex">#5A627C</span></div>
        <div class="sw light" style="background:#8A92AC"><span class="step">300</span><span class="hex">#8A92AC</span></div>
      </div>
    </div>
  </div>
</body>
</html>
