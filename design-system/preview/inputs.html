<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Inputs</title>
<link rel="stylesheet" href="../components.css">
<style>
  body { background: var(--bg); margin: 0; font-family: var(--font-body); }
  .card { padding: 24px 28px; display: grid; grid-template-columns: 1fr 1fr; gap: 18px 24px; }
  .stack { display: flex; flex-direction: column; }
</style>
</head>
<body>
  <div class="card">
    <div class="stack">
      <label class="field-label">Listing title</label>
      <input class="input" type="text" value="Vintage botanical floral repeat">
      <div class="help">Used to seed keyword research.</div>
    </div>
    <div class="stack">
      <label class="field-label">Search keywords</label>
      <div class="field-icon-wrap">
        <svg class="lucide" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
        <input class="input input--with-icon" type="text" placeholder="Try “cottagecore botanical”">
      </div>
      <div class="help">Press Enter to search Spoonflower.</div>
    </div>
    <div class="stack">
      <label class="field-label">Category</label>
      <select class="select">
        <option>Floral &amp; botanical</option>
        <option>Cottagecore</option>
        <option>Geometric</option>
      </select>
    </div>
    <div class="stack">
      <label class="field-label">Listing URL</label>
      <input class="input" type="text" value="" placeholder="https://www.spoonflower.com/…" style="border-color: var(--brick-500); box-shadow: 0 0 0 3px rgba(194,84,80,0.15);">
      <div class="help help--error">This doesn't look like a Spoonflower listing URL.</div>
    </div>
  </div>
</body>
</html>
