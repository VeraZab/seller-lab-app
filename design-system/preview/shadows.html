<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Shadows</title>
<link rel="stylesheet" href="card.css">
<style>
  .card { gap: 18px; padding: 32px 28px; }
  .row { display: flex; gap: 18px; }
  .item { flex: 1; display: flex; flex-direction: column; gap: 10px; align-items: center; }
  .surface {
    width: 100%;
    height: 64px;
    background: #fff;
    border-radius: 10px;
    border: 1px solid var(--border);
  }
  .name { font-family: var(--font-mono); font-size: 11px; color: var(--ink-900); }
  .desc { font-size: 11px; color: var(--ink-500); text-align: center; }
</style>
</head>
<body>
  <div class="card">
    <div class="row">
      <div class="item">
        <div class="surface" style="box-shadow: 0 1px 0 rgba(20,24,42,0.04);"></div>
        <span class="name">--shadow-xs</span>
        <span class="desc">inputs · chip hover</span>
      </div>
      <div class="item">
        <div class="surface" style="box-shadow: 0 1px 2px rgba(20,24,42,0.06), 0 1px 1px rgba(20,24,42,0.04);"></div>
        <span class="name">--shadow-sm</span>
        <span class="desc">cards · default</span>
      </div>
      <div class="item">
        <div class="surface" style="box-shadow: 0 6px 14px -6px rgba(20,24,42,0.10), 0 2px 4px rgba(20,24,42,0.05);"></div>
        <span class="name">--shadow-md</span>
        <span class="desc">hover · dropdowns</span>
      </div>
      <div class="item">
        <div class="surface" style="box-shadow: 0 18px 32px -12px rgba(20,24,42,0.16), 0 6px 12px -6px rgba(20,24,42,0.08);"></div>
        <span class="name">--shadow-lg</span>
        <span class="desc">dialogs · modals</span>
      </div>
    </div>
    <div style="font-size:12px; color:var(--ink-500); border-top: 1px solid var(--border); padding-top: 10px;">Paper-like elevation — no glow, no spread, no blue tint. Light is above-and-front, like a desk lamp.</div>
  </div>
</body>
</html>
