<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Buttons</title>
<link rel="stylesheet" href="../components.css">
<style>
  body { background: var(--bg); margin: 0; font-family: var(--font-body); }
  .card { padding: 24px 28px; display: flex; flex-direction: column; gap: 14px; }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .row-label { font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-500); width: 92px; text-transform: uppercase; letter-spacing: 0.08em; }
</style>
</head>
<body>
  <div class="card">
    <div class="row">
      <span class="row-label">Primary</span>
      <button class="btn">Save listing</button>
      <button class="btn btn--accent">Find keywords</button>
      <button class="btn btn--danger">Remove</button>
    </div>
    <div class="row">
      <span class="row-label">Secondary</span>
      <button class="btn btn--ghost">Cancel</button>
      <button class="btn btn--text">Skip for now</button>
      <button class="btn btn--ghost"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg> Search</button>
    </div>
    <div class="row">
      <span class="row-label">Sizes</span>
      <button class="btn btn--sm">Small</button>
      <button class="btn">Default</button>
      <button class="btn btn--lg">Large</button>
    </div>
    <div class="row">
      <span class="row-label">States</span>
      <button class="btn">Idle</button>
      <button class="btn" style="background:var(--slate-600)">Hover</button>
      <button class="btn" style="background:var(--slate-700); transform: scale(0.98); box-shadow: none;">Pressed</button>
      <button class="btn" disabled>Disabled</button>
    </div>
  </div>
</body>
</html>
