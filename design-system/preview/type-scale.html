<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Type scale</title>
<link rel="stylesheet" href="card.css">
<style>
  .card { gap: 0; }
  .row {
    display: grid;
    grid-template-columns: 110px 80px 1fr;
    align-items: baseline;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    gap: 14px;
  }
  .row:last-child { border-bottom: none; }
  .row .token-col { font-family: var(--font-mono); font-size: 11px; color: var(--ink-500); }
  .row .px-col { font-family: var(--font-mono); font-size: 11px; color: var(--ink-300); text-align: right; }
  .row .sample { color: var(--ink-900); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .display { font-family: var(--font-display); letter-spacing: -0.02em; line-height: 1; font-weight: 500; }
  .ui      { font-family: var(--font-body); letter-spacing: -0.005em; font-weight: 500; }
</style>
</head>
<body>
  <div class="card">
    <div class="row"><span class="token-col">--fs-5xl</span><span class="px-col">84</span><span class="sample display" style="font-size:46px;">Aa Ag</span></div>
    <div class="row"><span class="token-col">--fs-4xl</span><span class="px-col">60</span><span class="sample display" style="font-size:36px;">Sharper search</span></div>
    <div class="row"><span class="token-col">--fs-3xl</span><span class="px-col">44</span><span class="sample display" style="font-size:28px;">Section heading</span></div>
    <div class="row"><span class="token-col">--fs-2xl</span><span class="px-col">32</span><span class="sample ui" style="font-size:22px;">Subheading</span></div>
    <div class="row"><span class="token-col">--fs-xl</span><span class="px-col">24</span><span class="sample ui" style="font-size:18px;">Card title</span></div>
    <div class="row"><span class="token-col">--fs-lg</span><span class="px-col">20</span><span class="sample ui" style="font-size:16px;">Lead paragraph</span></div>
    <div class="row"><span class="token-col">--fs-base</span><span class="px-col">15</span><span class="sample" style="font-family:var(--font-body); font-size:15px;">Body — used everywhere</span></div>
    <div class="row"><span class="token-col">--fs-sm</span><span class="px-col">13</span><span class="sample" style="font-family:var(--font-body); font-size:13px; color:var(--ink-500);">Small — secondary info</span></div>
    <div class="row"><span class="token-col">--fs-xs</span><span class="px-col">12</span><span class="sample" style="font-family:var(--font-body); font-size:12px; color:var(--ink-500); letter-spacing:0.14em; text-transform:uppercase; font-weight:600;">EYEBROW</span></div>
  </div>
</body>
</html>
